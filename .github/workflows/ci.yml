name: CI (portfolio-v2)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Lint (portfolio-v2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -d "portfolio-v2" ]; then
            cd portfolio-v2
          fi
          npm ci

      - name: Run linter (use ESLint CLI to avoid inheriting root config)
        run: |
          if [ -d "portfolio-v2" ]; then
            cd portfolio-v2
          fi
          # Use the ESLint CLI directly so the config resolved is the one in portfolio-v2,
          # avoiding accidental loading of a root-level .eslintrc.json from the repo root.
          npx eslint "src/**/*.{js,jsx,ts,tsx}"

      - name: Type check (tsc)
        run: |
          if [ -d "portfolio-v2" ]; then
            cd portfolio-v2
          fi
          npx tsc --noEmit

      - name: Build
        run: |
          if [ -d "portfolio-v2" ]; then
            cd portfolio-v2
          fi
          npm run build

      - name: Start app for smoke test
        run: |
          if [ -d "portfolio-v2" ]; then
            cd portfolio-v2
          fi
          npm run start & 
          pid=$!
          for i in {1..15}; do
            sleep 1
            if curl -sSf http://localhost:3000/ > /dev/null; then
              echo "Smoke test passed"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "Smoke test failed: app did not respond"
              kill $pid || true
              exit 1
            fi
          done
          kill $pid || true

      - name: Upload build artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-v2-next-build
          path: .next
