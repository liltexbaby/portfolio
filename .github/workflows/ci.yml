name: CI (portfolio-v2)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Lint (portfolio-v2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: portfolio-v2
        run: npm ci

      - name: Run linter
        working-directory: portfolio-v2
        run: npm run lint

      - name: Type check (tsc)
        working-directory: portfolio-v2
        run: npx tsc --noEmit

      - name: Build
        working-directory: portfolio-v2
        run: npm run build

      - name: Start app for smoke test
        working-directory: portfolio-v2
        run: |
          npm run start & 
          pid=$!
          for i in {1..15}; do
            sleep 1
            if curl -sSf http://localhost:3000/ > /dev/null; then
              echo "Smoke test passed"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "Smoke test failed: app did not respond"
              kill $pid || true
              exit 1
            fi
          done
          kill $pid || true

      - name: Upload build artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-v2-next-build
          path: .next
