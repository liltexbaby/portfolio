name: Autofix ESLint (portfolio-v2)

on:
  workflow_dispatch:

jobs:
  autofix:
    name: Run ESLint --fix and open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install portfolio-v2 dependencies
        working-directory: portfolio-v2
        run: npm ci

      - name: Run ESLint --fix
        working-directory: portfolio-v2
        # allow errors so we can still create a PR with fixes
        run: npm run lint -- --fix || true

      - name: Create pull request with autofix changes
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: apply ESLint --fix (autofix)'
          branch: 'chore/autofix-${{ github.run_id }}'
          title: 'chore: apply ESLint --fix (autofix)'
          body: |
            This pull request contains fixes applied automatically by running
            `eslint --fix` in the portfolio-v2 subproject. Review and merge if acceptable.
          base: main
